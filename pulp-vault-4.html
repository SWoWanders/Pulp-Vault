<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Pulp Vault — Public Domain Comics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Barlow+Condensed:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --bg-soft: #0a0a0a;
    --bg-card: #1a1a1a;
    --bg-elev: #242424;
    --text: #f4f1ea;
    --text-dim: #a89c8e;
    --text-faint: #6c6258;
    --accent: #e63927;
    --accent-glow: rgba(230, 57, 39, 0.35);
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  body {
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 14px 80px;
    position: relative;
    z-index: 2;
  }

  /* ===== Header ===== */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 22px;
    padding-top: 6px;
  }

  .logo {
    font-family: 'Bangers', cursive;
    font-size: clamp(38px, 10vw, 54px);
    color: var(--accent);
    letter-spacing: 2px;
    line-height: 1;
    text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.6), 0 0 24px var(--accent-glow);
    transform: skewX(-6deg);
    transform-origin: left;
  }

  .tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 500;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ===== Search ===== */
  .search { position: relative; margin-bottom: 18px; }
  .search input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px 14px 46px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .search input::placeholder { color: var(--text-faint); }
  .search input:focus { border-color: var(--border-strong); background: var(--bg-elev); }
  .search svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-faint); pointer-events: none; }

  /* ===== Filter chips ===== */
  .chips {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .chips::-webkit-scrollbar { display: none; }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .chip:hover { color: var(--text); border-color: var(--border-strong); }
  .chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .chip svg { width: 14px; height: 14px; }

  /* ===== Comic grid ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 18px; } }
  @media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 1200px) { .grid { grid-template-columns: repeat(5, 1fr); } }

  .card {
    background: var(--bg-card);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: transform 0.2s ease, box-shadow 0.2s ease, outline-color 0.2s ease;
    outline: 1px solid transparent;
    outline-offset: -1px;
  }
  .card:hover { box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5); }
  .card:active, .card.selected {
    transform: scale(0.98);
    outline: 1.5px solid var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 24px rgba(230, 57, 39, 0.35);
  }

  .cover {
    aspect-ratio: 2 / 3;
    width: 100%;
    background: #0a0a0a;
    position: relative;
    overflow: hidden;
  }
  .cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .card:hover .cover img { transform: scale(1.04); }

  .cover-fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    font-family: 'Special Elite', monospace;
    font-size: 12px;
    text-align: center;
    padding: 12px;
  }

  .cover-title {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 24px 12px 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
    font-family: 'Bangers', cursive;
    font-style: italic;
    font-size: 18px;
    line-height: 1.1;
    letter-spacing: 1px;
    color: #ffffff;
    text-shadow:
      2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000,
      0 0 8px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 2;
  }

  .card-info { padding: 8px 12px 10px; }
  .card-year {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* ===== Reader Modal (custom image-based) ===== */
  .reader {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 1000;
    display: none;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    user-select: none;
    -webkit-user-select: none;
  }
  .reader.open { display: flex; }

  .reader-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    z-index: 3;
  }

  .reader-meta { flex: 1; overflow: hidden; min-width: 0; }
  .reader-title {
    font-family: 'Bangers', cursive;
    font-style: italic;
    font-size: 16px;
    color: var(--text);
    letter-spacing: 1px;
    text-transform: uppercase;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .reader-creator {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .icon-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
    text-decoration: none;
  }
  .icon-btn:active { background: var(--bg-elev); }

  /* Page viewport */
  .page-viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
    touch-action: none;
  }

  .page-stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-origin: 0 0;
    will-change: transform;
  }

  .page-stage img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    -webkit-user-drag: none;
    user-drag: none;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .reader-loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 2;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--bg-elev);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .reader-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 10px 16px;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    z-index: 3;
  }

  .page-indicator {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
    letter-spacing: 1px;
    min-width: 70px;
    text-align: center;
  }

  .nav-arrow {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .nav-arrow:active:not(:disabled) { background: var(--bg-elev); }
  .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }

  .zoom-hint {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-left: auto;
    max-width: 110px;
    line-height: 1.2;
  }

  /* Empty / error */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: 'Special Elite', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 14px;
  }
  .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.5; }

  .card { animation: rise 0.5s ease backwards; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">PULP VAULT</div>
    <div class="tag">Public Domain</div>
  </header>

  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input id="searchInput" type="search" placeholder="Search titles, creators..." autocomplete="off">
  </div>

  <div class="chips" id="chips">
    <button class="chip active" data-sort="popular">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
      Popular
    </button>
    <button class="chip" data-sort="new">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      New
    </button>
    <button class="chip" data-sort="oldest">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Oldest
    </button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- Reader Modal -->
<div class="reader" id="reader" role="dialog" aria-modal="true">
  <div class="reader-bar">
    <button class="icon-btn" id="closeReader" aria-label="Close reader">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="reader-meta">
      <div class="reader-title" id="readerTitle"></div>
      <div class="reader-creator" id="readerCreator"></div>
    </div>
    <a class="icon-btn" id="openExternal" href="#" target="_blank" rel="noopener" aria-label="Open in new tab">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
    </a>
  </div>

  <div class="page-viewport" id="pageViewport">
    <div class="page-stage" id="pageStage">
      <img id="pageImage" alt="Comic page">
    </div>
    <div class="reader-loading" id="readerLoading">
      <div class="spinner"></div>
      <div>Loading…</div>
    </div>
  </div>

  <div class="reader-controls">
    <button class="nav-arrow" id="prevPage" aria-label="Previous page">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="page-indicator" id="pageIndicator">— / —</div>
    <button class="nav-arrow" id="nextPage" aria-label="Next page">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>
    <div class="zoom-hint">Swipe · Pinch<br>Double-tap</div>
  </div>
</div>

<script>
/* ============================================================
   PULP VAULT — public domain comic library
   Source: archive.org Comic Books and Graphic Novels collection
   Reader: custom image-based with swipe / pinch / double-tap
   v4 - 2026-04-24
   ============================================================ */

const SEED_COMICS = [
  { title: 'Atomic War! #1',           year: 1952, archiveId: 'atomic-war-01',           creator: 'Ace Comics' },
  { title: 'Tales From The Crypt #17', year: 1950, archiveId: 'tales-from-the-crypt-17', creator: 'EC Comics'  }
];

let COMICS = [];
let currentSort = 'popular';
let currentQuery = '';

const grid          = document.getElementById('grid');
const searchInput   = document.getElementById('searchInput');
const chips         = document.querySelectorAll('.chip');

/* ====== Fetch comics from Archive.org ====== */
async function loadComics() {
  // Pull most-popular comics from the main "Comic Books and Graphic Novels"
  // collection at Archive.org — same source the Lovable reference app uses.
  try {
    const url = 'https://archive.org/advancedsearch.php?' +
      'q=' + encodeURIComponent('collection:(comics) AND mediatype:texts') +
      '&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=year&fl[]=date&fl[]=downloads&fl[]=imagecount' +
      '&sort[]=downloads+desc' +
      '&rows=80&output=json';

    const res = await fetch(url);
    if (!res.ok) throw new Error('API fetch failed: ' + res.status);
    const data = await res.json();
    const docs = (data && data.response && data.response.docs) || [];
    if (!docs.length) throw new Error('No results');

    COMICS = docs
      .filter(d => d.identifier && d.title)
      .map((d, i) => ({
        archiveId: d.identifier,
        title: d.title,
        creator: Array.isArray(d.creator) ? d.creator[0] : (d.creator || 'Unknown Creator'),
        year: d.year || (d.date ? new Date(d.date).getFullYear() : 1950),
        popularity: d.downloads || (10000 - i),
        added: d.date || '2024-01-01',
        pageCount: d.imagecount || null
      }));
  } catch (err) {
    console.warn('Falling back to seed list:', err);
    COMICS = SEED_COMICS.map(c => ({ ...c, popularity: 100, added: '2024-01-01', pageCount: null }));
  }
  render();
}

/* ====== URL builders ====== */
const coverUrl     = id => `https://archive.org/services/img/${id}`;
const externalUrl  = id => `https://archive.org/details/${id}`;
// Per-page image at constrained width — Archive.org's built-in image-on-demand endpoint
const pageImageUrl = (id, n, w = 1200) => `https://archive.org/download/${id}/page/n${n}_w${w}.jpg`;

/* ====== Render gallery ====== */
function render() {
  if (!COMICS.length) return;
  const q = currentQuery.trim().toLowerCase();
  let list = COMICS.filter(c =>
    !q ||
    c.title.toLowerCase().includes(q) ||
    String(c.year).includes(q) ||
    (c.creator || '').toLowerCase().includes(q)
  );

  if (currentSort === 'popular')      list.sort((a, b) => b.popularity - a.popularity);
  else if (currentSort === 'new')     list.sort((a, b) => new Date(b.added) - new Date(a.added));
  else if (currentSort === 'oldest')  list.sort((a, b) => a.year - b.year);

  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><div>No issues found in the vault</div></div>`;
    return;
  }

  list.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i, 12) * 35}ms`;
    card.innerHTML = `
      <div class="cover">
        <div class="cover-fallback">${escapeHtml(c.title)}</div>
        <img loading="lazy" alt="${escapeHtml(c.title)} cover" src="${coverUrl(c.archiveId)}" onerror="this.style.display='none'">
        <div class="cover-title">${escapeHtml(c.title)}</div>
      </div>
      <div class="card-info"><div class="card-year">${c.year}</div></div>`;
    card.addEventListener('click', () => {
      document.querySelectorAll('.card.selected').forEach(el => el.classList.remove('selected'));
      card.classList.add('selected');
      setTimeout(() => openReader(c), 140);
    });
    grid.appendChild(card);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ====== Filters ====== */
searchInput.addEventListener('input', e => { currentQuery = e.target.value; render(); });
chips.forEach(chip => {
  chip.addEventListener('click', () => {
    chips.forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentSort = chip.dataset.sort;
    render();
  });
});

/* =============================================================
   READER — custom image-based with swipe / pinch / double-tap
   ============================================================= */

const reader        = document.getElementById('reader');
const readerTitle   = document.getElementById('readerTitle');
const readerCreator = document.getElementById('readerCreator');
const readerLoading = document.getElementById('readerLoading');
const closeBtn      = document.getElementById('closeReader');
const openExt       = document.getElementById('openExternal');
const viewport      = document.getElementById('pageViewport');
const stage         = document.getElementById('pageStage');
const pageImg       = document.getElementById('pageImage');
const pageIndicator = document.getElementById('pageIndicator');
const prevBtn       = document.getElementById('prevPage');
const nextBtn       = document.getElementById('nextPage');

let currentComic = null;
let pageIndex = 0;
let totalPages = null;
let knownMaxPage = 0;

let scale = 1, tx = 0, ty = 0;
const MIN_SCALE = 1, MAX_SCALE = 5;

function applyTransform(animate = false) {
  stage.style.transition = animate ? 'transform 0.2s ease' : 'none';
  stage.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

function resetTransform() {
  scale = 1; tx = 0; ty = 0;
  applyTransform();
}

function updateIndicator() {
  if (totalPages) {
    pageIndicator.textContent = `${pageIndex + 1} / ${totalPages}`;
  } else {
    pageIndicator.textContent = `${pageIndex + 1} / ${knownMaxPage + 1}+`;
  }
  prevBtn.disabled = pageIndex === 0;
  nextBtn.disabled = totalPages !== null && pageIndex >= totalPages - 1;
}

function loadPage(n) {
  if (n < 0) return;
  if (totalPages !== null && n >= totalPages) return;
  pageIndex = n;
  resetTransform();
  readerLoading.style.display = 'flex';
  pageImg.style.opacity = '0';

  const url = pageImageUrl(currentComic.archiveId, n);
  pageImg.onload = () => {
    readerLoading.style.display = 'none';
    pageImg.style.opacity = '1';
    if (n > knownMaxPage) knownMaxPage = n;
    updateIndicator();
    if (totalPages === null || n + 1 < totalPages) {
      const pre = new Image();
      pre.src = pageImageUrl(currentComic.archiveId, n + 1);
    }
  };
  pageImg.onerror = () => {
    if (n > 0) {
      totalPages = n;
      pageIndex = n - 1;
      loadPage(pageIndex);
    } else {
      readerLoading.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:0 20px;line-height:1.5;">Could not load this comic.<br>Try opening it on Archive.org<br>using the link above.</div>';
    }
  };
  pageImg.src = url;
  updateIndicator();
}

function nextPage() { loadPage(pageIndex + 1); }
function prevPage() { if (pageIndex > 0) loadPage(pageIndex - 1); }

prevBtn.addEventListener('click', prevPage);
nextBtn.addEventListener('click', nextPage);

/* ===== Reader open/close ===== */
function openReader(comic) {
  currentComic = comic;
  totalPages = comic.pageCount || null;
  knownMaxPage = 0;
  pageIndex = 0;
  readerTitle.textContent = comic.title;
  readerCreator.textContent = `${(comic.creator || 'Unknown').toString().slice(0, 40)} · ${comic.year}`;
  openExt.href = externalUrl(comic.archiveId);
  reader.classList.add('open');
  document.body.style.overflow = 'hidden';
  // Restore loading text in case a previous error replaced it
  readerLoading.innerHTML = '<div class="spinner"></div><div>Loading…</div>';
  loadPage(0);
}

function closeReader() {
  reader.classList.remove('open');
  document.body.style.overflow = '';
  pageImg.src = '';
  currentComic = null;
}

closeBtn.addEventListener('click', closeReader);
document.addEventListener('keydown', e => {
  if (!reader.classList.contains('open')) return;
  if (e.key === 'Escape')      closeReader();
  if (e.key === 'ArrowRight')  nextPage();
  if (e.key === 'ArrowLeft')   prevPage();
});

/* ===== Touch gestures ===== */
let gesture = null;
let startX = 0, startY = 0;
let startScale = 1, startTx = 0, startTy = 0;
let startDist = 0, startMidX = 0, startMidY = 0;
let lastTapTime = 0, lastTapX = 0, lastTapY = 0;

function dist(a, b) {
  const dx = a.clientX - b.clientX, dy = a.clientY - b.clientY;
  return Math.hypot(dx, dy);
}

viewport.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startTx = tx; startTy = ty;
    gesture = scale > 1 ? 'pan' : 'swipe';
  } else if (e.touches.length === 2) {
    gesture = 'pinch';
    startDist = dist(e.touches[0], e.touches[1]);
    startScale = scale;
    startMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    startMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    startTx = tx; startTy = ty;
  }
}, { passive: true });

viewport.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && gesture === 'pan') {
    const t = e.touches[0];
    tx = startTx + (t.clientX - startX);
    ty = startTy + (t.clientY - startY);
    applyTransform();
  } else if (e.touches.length === 1 && gesture === 'swipe') {
    const dx = e.touches[0].clientX - startX;
    stage.style.transition = 'none';
    stage.style.transform = `translate(${dx}px, 0) scale(1)`;
  } else if (e.touches.length === 2 && gesture === 'pinch') {
    const d = dist(e.touches[0], e.touches[1]);
    const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, startScale * (d / startDist)));
    const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const ratio = newScale / startScale;
    tx = startTx + (midX - startMidX) - (startMidX - startTx) * (ratio - 1);
    ty = startTy + (midY - startMidY) - (startMidY - startTy) * (ratio - 1);
    scale = newScale;
    applyTransform();
  }
}, { passive: true });

viewport.addEventListener('touchend', e => {
  if (gesture === 'swipe' && e.changedTouches.length) {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) nextPage(); else prevPage();
    } else {
      stage.style.transition = 'transform 0.2s ease';
      stage.style.transform = `translate(0, 0) scale(1)`;
    }
  }
  if (scale < MIN_SCALE) { scale = MIN_SCALE; tx = 0; ty = 0; applyTransform(true); }

  // Double-tap detection
  if (e.changedTouches.length === 1 && gesture !== 'pinch') {
    const now = Date.now();
    const t = e.changedTouches[0];
    const movedLittle = Math.abs(t.clientX - startX) < 10 && Math.abs(t.clientY - startY) < 10;
    if (movedLittle && now - lastTapTime < 300 && Math.hypot(t.clientX - lastTapX, t.clientY - lastTapY) < 30) {
      if (scale > 1) {
        resetTransform();
        applyTransform(true);
      } else {
        scale = 2.5;
        const rect = viewport.getBoundingClientRect();
        tx = (rect.width / 2 - (t.clientX - rect.left)) * 1.5;
        ty = (rect.height / 2 - (t.clientY - rect.top)) * 1.5;
        applyTransform(true);
      }
      lastTapTime = 0;
    } else {
      lastTapTime = now;
      lastTapX = t.clientX;
      lastTapY = t.clientY;
    }
  }

  gesture = null;
}, { passive: true });

/* ===== Init ===== */
grid.innerHTML = `<div class="empty"><div class="spinner" style="margin: 0 auto 14px;"></div><div>Loading the vault…</div></div>`;
loadComics();
</script>
</body>
</html>
