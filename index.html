<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Pulp Vault — Public Domain Comics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Barlow+Condensed:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --bg-soft: #0a0a0a;
    --bg-card: #1a1a1a;
    --bg-elev: #242424;
    --text: #f4f1ea;
    --text-dim: #a89c8e;
    --text-faint: #6c6258;
    --accent: #e63927;
    --accent-glow: rgba(230, 57, 39, 0.35);
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  body {
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Subtle noise overlay for that pulp paper feel */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 18px 80px;
    position: relative;
    z-index: 2;
  }

  /* ===== Header ===== */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 22px;
    padding-top: 6px;
  }

  .logo {
    font-family: 'Bangers', cursive;
    font-size: clamp(38px, 10vw, 54px);
    color: var(--accent);
    letter-spacing: 2px;
    line-height: 1;
    text-shadow:
      2px 2px 0 rgba(0, 0, 0, 0.6),
      0 0 24px var(--accent-glow);
    transform: skewX(-6deg);
    transform-origin: left;
  }

  .tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 500;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ===== Search ===== */
  .search {
    position: relative;
    margin-bottom: 18px;
  }

  .search input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px 14px 46px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .search input::placeholder { color: var(--text-faint); }
  .search input:focus { border-color: var(--border-strong); background: var(--bg-elev); }

  .search svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    pointer-events: none;
  }

  /* ===== Filter chips ===== */
  .chips {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .chips::-webkit-scrollbar { display: none; }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .chip:hover { color: var(--text); border-color: var(--border-strong); }

  .chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .chip svg { width: 14px; height: 14px; }

  /* ===== Comic grid ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 18px; } }
  @media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 1200px) { .grid { grid-template-columns: repeat(5, 1fr); } }

  .card {
    background: var(--bg-card);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    border: 1px solid var(--border);
  }

  .card:active { transform: scale(0.97); }
  .card:hover { box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5); }

  .cover {
    aspect-ratio: 2 / 3;
    width: 100%;
    background: #000;
    position: relative;
    overflow: hidden;
  }

  .cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .card:hover .cover img { transform: scale(1.04); }

  .cover-fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    font-family: 'Special Elite', monospace;
    font-size: 12px;
    text-align: center;
    padding: 12px;
  }

  .card-info {
    padding: 8px 12px 10px;
  }

  /* Title overlaid on cover image */
  .cover-title {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 24px 12px 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
    font-family: 'Bangers', cursive;
    font-style: italic;
    font-size: 18px;
    line-height: 1.1;
    letter-spacing: 1px;
    color: #ffffff;
    text-shadow:
      2px 2px 0 #000,
      -1px -1px 0 #000,
      1px -1px 0 #000,
      -1px 1px 0 #000,
      0 0 8px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 2;
  }

  .card-year {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* ===== Reader Modal ===== */
  .reader {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 1000;
    display: none;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .reader.open { display: flex; }

  .reader-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: rgba(14, 14, 16, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    z-index: 2;
  }

  .reader-title {
    font-family: 'Special Elite', monospace;
    font-size: 14px;
    color: var(--text);
    text-transform: uppercase;
    flex: 1;
    margin: 0 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .icon-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .icon-btn:active { background: var(--bg-elev); }

  .reader-frame-wrap {
    flex: 1;
    background: #000;
    position: relative;
    overflow: hidden;
  }

  .reader-frame {
    width: 100%;
    height: 100%;
    border: 0;
    background: #000;
  }

  .reader-loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--bg-elev);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Empty state ===== */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: 'Special Elite', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 14px;
  }

  .empty-icon {
    font-size: 36px;
    margin-bottom: 10px;
    opacity: 0.5;
  }

  /* ===== Animation ===== */
  .card {
    animation: rise 0.5s ease backwards;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">PULP VAULT</div>
    <div class="tag">Public Domain</div>
  </header>

  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input id="searchInput" type="search" placeholder="Search titles, creators..." autocomplete="off">
  </div>

  <div class="chips" id="chips">
    <button class="chip active" data-sort="popular">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
      Popular
    </button>
    <button class="chip" data-sort="new">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      New
    </button>
    <button class="chip" data-sort="oldest">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Oldest
    </button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- Reader -->
<div class="reader" id="reader" role="dialog" aria-modal="true">
  <div class="reader-bar">
    <button class="icon-btn" id="closeReader" aria-label="Close reader">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="reader-title" id="readerTitle"></div>
    <a class="icon-btn" id="openExternal" href="#" target="_blank" rel="noopener" aria-label="Open in new tab">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
    </a>
  </div>
  <div class="reader-frame-wrap">
    <div class="reader-loading" id="readerLoading">
      <div class="spinner"></div>
      <div>Loading issue…</div>
    </div>
    <iframe class="reader-frame" id="readerFrame" allowfullscreen></iframe>
  </div>
</div>

<script>
  /* ============================================================
     PULP VAULT — Public Domain Comic Library
     Each comic streams from Archive.org's BookReader (embeddable).
     Covers also pulled directly from Archive.org so no broken images.
     ============================================================ */

  // Curated seed list of verified-working public domain comics on Archive.org.
  // Used as a fallback if the live API fetch fails.
  const SEED_COMICS = [
    { title: 'Atomic War! #1',          year: 1952, archiveId: 'atomic-war-01',          popularity: 98 },
    { title: 'Atomic War! #2',          year: 1952, archiveId: 'atomic-war-02',          popularity: 88 },
    { title: 'Atomic War! #3',          year: 1953, archiveId: 'atomic-war-003',         popularity: 84 },
    { title: 'Tales From The Crypt #17', year: 1950, archiveId: 'tales-from-the-crypt-17', popularity: 99 }
  ];

  let COMICS = [];

  /**
   * Fetch a fresh list of public domain comics from Archive.org's search API.
   * Filters for the comics_inbox collection (verified PD Golden Age) so every
   * result is guaranteed readable in the embedded viewer.
   * v3 - 2026-04-24
   */
  async function loadComics() {
    try {
      const url = 'https://archive.org/advancedsearch.php?' +
        'q=' + encodeURIComponent(
          'collection:(comics_inbox OR folkscanomy_comics OR ace-comics OR digital_comics_museum) ' +
          'AND mediatype:texts AND year:[1938 TO 1959] AND format:pdf'
        ) +
        '&fl[]=identifier&fl[]=title&fl[]=year&fl[]=downloads&fl[]=date' +
        '&sort[]=downloads+desc' +
        '&rows=60&output=json';

      const res = await fetch(url);
      if (!res.ok) throw new Error('API fetch failed: ' + res.status);
      const data = await res.json();
      const docs = (data && data.response && data.response.docs) || [];

      if (!docs.length) throw new Error('No results returned');

      COMICS = docs
        .filter(d => d.identifier && d.title)
        .map((d, i) => ({
          archiveId: d.identifier,
          title: d.title.length > 60 ? d.title.slice(0, 60) + '…' : d.title,
          year: d.year || (d.date ? new Date(d.date).getFullYear() : 1950),
          popularity: d.downloads || (1000 - i),
          added: d.date || '2024-01-01'
        }));
    } catch (err) {
      console.warn('Falling back to seed list:', err);
      COMICS = SEED_COMICS.map(c => ({ ...c, added: '2024-01-01' }));
    }
    render();
  }

  // Build cover & reader URLs from Archive.org item IDs
  // The /embed/ URL is the iframe-friendly version; /details/ blocks framing.
  function coverUrl(id)    { return `https://archive.org/services/img/${id}`; }
  function readerUrl(id)   { return `https://archive.org/embed/${id}`; }
  function externalUrl(id) { return `https://archive.org/details/${id}`; }

  const grid = document.getElementById('grid');
  const searchInput = document.getElementById('searchInput');
  const chips = document.querySelectorAll('.chip');

  let currentSort = 'popular';
  let currentQuery = '';

  function render() {
    if (!COMICS.length) return; // still loading

    const q = currentQuery.trim().toLowerCase();
    let list = COMICS.filter(c => !q || c.title.toLowerCase().includes(q) || String(c.year).includes(q));

    if (currentSort === 'popular')   list.sort((a, b) => b.popularity - a.popularity);
    else if (currentSort === 'new')  list.sort((a, b) => new Date(b.added) - new Date(a.added));
    else if (currentSort === 'oldest') list.sort((a, b) => a.year - b.year);

    grid.innerHTML = '';

    if (!list.length) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚠</div>
          <div>No issues found in the vault</div>
        </div>`;
      return;
    }

    list.forEach((c, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${Math.min(i, 12) * 35}ms`;
      card.innerHTML = `
        <div class="cover">
          <div class="cover-fallback">${c.title}</div>
          <img loading="lazy" alt="${c.title} cover" src="${coverUrl(c.archiveId)}"
               onerror="this.style.display='none'">
          <div class="cover-title">${c.title}</div>
        </div>
        <div class="card-info">
          <div class="card-year">${c.year}</div>
        </div>`;
      card.addEventListener('click', () => openReader(c));
      grid.appendChild(card);
    });
  }

  /* ===== Filtering ===== */
  searchInput.addEventListener('input', e => {
    currentQuery = e.target.value;
    render();
  });

  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentSort = chip.dataset.sort;
      render();
    });
  });

  /* ===== Reader ===== */
  const reader      = document.getElementById('reader');
  const readerFrame = document.getElementById('readerFrame');
  const readerTitle = document.getElementById('readerTitle');
  const readerLoad  = document.getElementById('readerLoading');
  const closeBtn    = document.getElementById('closeReader');
  const openExt     = document.getElementById('openExternal');

  function openReader(comic) {
    readerTitle.textContent = comic.title;
    openExt.href = externalUrl(comic.archiveId);
    readerLoad.style.display = 'flex';
    readerFrame.src = readerUrl(comic.archiveId);
    reader.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeReader() {
    reader.classList.remove('open');
    readerFrame.src = '';
    document.body.style.overflow = '';
  }

  readerFrame.addEventListener('load', () => {
    readerLoad.style.display = 'none';
  });

  closeBtn.addEventListener('click', closeReader);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && reader.classList.contains('open')) closeReader();
  });

  /* Initial paint */
  grid.innerHTML = `
    <div class="empty">
      <div class="spinner" style="margin: 0 auto 14px;"></div>
      <div>Loading the vault…</div>
    </div>`;
  loadComics();
</script>
</body>
</html>
