<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Pulp Vault — Public Domain Comics & Pulps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Barlow+Condensed:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --bg-soft: #0a0a0a;
    --bg-card: #1a1a1a;
    --bg-elev: #242424;
    --text: #f4f1ea;
    --text-dim: #a89c8e;
    --text-faint: #6c6258;
    --accent: #e63927;
    --accent-glow: rgba(230, 57, 39, 0.35);
    --gold: #d4a93a;
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  body {
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 14px 80px;
    position: relative;
    z-index: 2;
  }

  /* ===== Header ===== */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    padding-top: 6px;
  }
  .logo {
    font-family: 'Bangers', cursive;
    font-size: clamp(38px, 10vw, 54px);
    color: var(--accent);
    letter-spacing: 2px;
    line-height: 1;
    text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.6), 0 0 24px var(--accent-glow);
    transform: skewX(-6deg);
    transform-origin: left;
    cursor: pointer;
  }
  .tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 500;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ===== Source tabs ===== */
  .source-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    background: var(--bg-card);
    padding: 4px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .source-tab {
    flex: 1;
    padding: 10px 4px;
    background: transparent;
    border: 0;
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'Bangers', cursive;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    white-space: nowrap;
  }
  .source-tab.active {
    background: var(--bg-elev);
    color: var(--text);
    box-shadow: 0 1px 0 rgba(255,255,255,0.05);
  }

  /* ===== Search ===== */
  .search { position: relative; margin-bottom: 14px; }
  .search input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px 14px 46px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .search input::placeholder { color: var(--text-faint); }
  .search input:focus { border-color: var(--border-strong); background: var(--bg-elev); }
  .search svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-faint); pointer-events: none; }

  /* ===== Filter chips ===== */
  .chips {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .chips::-webkit-scrollbar { display: none; }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .chip:hover { color: var(--text); border-color: var(--border-strong); }
  .chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .chip.active.gold {
    background: var(--gold);
    color: #1a1a1a;
    border-color: var(--gold);
    box-shadow: 0 0 16px rgba(212, 169, 58, 0.45);
  }
  .chip svg { width: 13px; height: 13px; }

  .filter-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 18px; }
  .filter-row .label {
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0 4px;
    margin-top: 4px;
  }

  /* ===== Continue reading strip ===== */
  .continue-strip {
    background: linear-gradient(135deg, rgba(230,57,39,0.08), rgba(212,169,58,0.05));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .continue-strip:hover { border-color: var(--border-strong); }
  .continue-strip:active { transform: scale(0.99); }
  .continue-cover {
    width: 50px;
    height: 75px;
    border-radius: 6px;
    background: #000;
    object-fit: cover;
    flex-shrink: 0;
  }
  .continue-info { flex: 1; min-width: 0; }
  .continue-label {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .continue-title {
    font-family: 'Bangers', cursive;
    font-style: italic;
    font-size: 17px;
    letter-spacing: 1px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 2px;
  }
  .continue-progress {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* ===== Comic grid ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 18px; } }
  @media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 1200px) { .grid { grid-template-columns: repeat(5, 1fr); } }

  .card {
    background: var(--bg-card);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    outline: 1px solid transparent;
    outline-offset: -1px;
  }
  .card:hover { box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5); }
  .card:active, .card.selected {
    transform: scale(0.98);
    outline: 1.5px solid var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 24px rgba(230, 57, 39, 0.35);
  }

  .cover {
    aspect-ratio: 2 / 3;
    width: 100%;
    background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
    position: relative;
    overflow: hidden;
  }
  /* Skeleton shimmer while cover loads */
  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
    animation: shimmer 1.6s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes shimmer { 0%{transform:translateX(-100%);} 100%{transform:translateX(100%);} }

  .cover img {
    position: relative;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease, opacity 0.3s ease;
    opacity: 0;
    z-index: 1;
  }
  .cover img.loaded { opacity: 1; }
  .card:hover .cover img.loaded { transform: scale(1.04); }

  .cover-fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    font-family: 'Special Elite', monospace;
    font-size: 12px;
    text-align: center;
    padding: 12px;
    z-index: 0;
  }

  .cover-title {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 24px 12px 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
    font-family: 'Bangers', cursive;
    font-style: italic;
    font-size: 17px;
    line-height: 1.1;
    letter-spacing: 1px;
    color: #ffffff;
    text-shadow:
      2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000,
      0 0 8px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 2;
  }

  /* Heart badge for favorites */
  .fav-badge {
    position: absolute;
    top: 8px; right: 8px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 3;
    transition: transform 0.15s, background 0.15s;
  }
  .fav-badge:active { transform: scale(0.85); }
  .fav-badge svg { width: 16px; height: 16px; color: rgba(255,255,255,0.5); transition: color 0.2s; }
  .fav-badge.active svg { color: var(--accent); fill: var(--accent); }
  .fav-badge.active { background: rgba(230,57,39,0.15); }

  .card-info {
    padding: 8px 12px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-year {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .card-progress {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ===== Reader Modal ===== */
  .reader {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 1000;
    display: none;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    user-select: none;
    -webkit-user-select: none;
  }
  .reader.open { display: flex; }
  .reader.immersive .reader-bar,
  .reader.immersive .reader-controls { transform: translateY(0); opacity: 0; pointer-events: none; }
  .reader.immersive .reader-bar { transform: translateY(-100%); }
  .reader.immersive .reader-controls { transform: translateY(100%); }

  .reader-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    z-index: 3;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .reader-meta { flex: 1; overflow: hidden; min-width: 0; }
  .reader-title {
    font-family: 'Bangers', cursive;
    font-style: italic;
    font-size: 16px;
    color: var(--text);
    letter-spacing: 1px;
    text-transform: uppercase;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .reader-creator {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .icon-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
  }
  .icon-btn:active { background: var(--bg-elev); }
  .icon-btn.fav-active svg { color: var(--accent); fill: var(--accent); }

  /* Page viewport */
  .page-viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
    touch-action: none;
  }

  .page-stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    will-change: transform;
  }

  .page-stage img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    -webkit-user-drag: none;
    user-drag: none;
    pointer-events: none;
    transition: opacity 0.15s ease;
  }

  /* Tap zones (invisible) for prev/next */
  .tap-zone {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 22%;
    z-index: 2;
    cursor: pointer;
  }
  .tap-zone.left  { left: 0; }
  .tap-zone.right { right: 0; }
  /* Subtle hint on first reader open */
  .tap-zone-hint {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(to right,
        rgba(230,57,39,0.15) 0%,
        rgba(230,57,39,0) 22%,
        rgba(230,57,39,0) 78%,
        rgba(230,57,39,0.15) 100%);
    opacity: 0;
    z-index: 2;
    transition: opacity 0.4s ease;
  }
  .tap-zone-hint.show { opacity: 1; animation: hint-fade 1.6s ease forwards; }
  @keyframes hint-fade { 0% { opacity: 0; } 30% { opacity: 1; } 100% { opacity: 0; } }

  .reader-loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 4;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--bg-elev);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .reader-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    z-index: 3;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--bg-elev);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    transition: width 0.2s ease;
  }

  .page-indicator {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    letter-spacing: 1px;
    min-width: 50px;
    text-align: center;
  }

  .nav-arrow {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .nav-arrow:active:not(:disabled) { background: var(--bg-elev); }
  .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Empty / error */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: 'Special Elite', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 14px;
  }
  .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.5; }

  .card { animation: rise 0.5s ease backwards; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg-elev);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 999px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 2000;
    transition: transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo" id="logo">PULP VAULT</div>
    <div class="tag">Public Domain</div>
  </header>

  <div class="source-tabs" id="sourceTabs">
    <button class="source-tab active" data-source="comics">Comics</button>
    <button class="source-tab" data-source="pulps">Pulp Mags</button>
    <button class="source-tab" data-source="fiction">Pulp Fiction</button>
    <button class="source-tab" data-source="favorites">Favorites</button>
  </div>

  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input id="searchInput" type="search" placeholder="Search titles, creators..." autocomplete="off">
  </div>

  <div class="filter-row">
    <div class="chips" id="chipsCategory">
      <!-- categories injected by JS -->
    </div>
    <div class="chips" id="chipsSort">
      <button class="chip active" data-sort="popular">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        Popular
      </button>
      <button class="chip" data-sort="random">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><circle cx="16" cy="16" r="1.5" fill="currentColor"/><circle cx="8" cy="16" r="1.5" fill="currentColor"/><circle cx="16" cy="8" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
        Random
      </button>
      <button class="chip" data-sort="new">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Newest
      </button>
      <button class="chip" data-sort="oldest">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Oldest
      </button>
    </div>
  </div>

  <div id="continueStrip"></div>

  <div class="grid" id="grid"></div>
</div>

<!-- Reader Modal -->
<div class="reader" id="reader" role="dialog" aria-modal="true">
  <div class="reader-bar">
    <button class="icon-btn" id="closeReader" aria-label="Close reader">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="reader-meta">
      <div class="reader-title" id="readerTitle"></div>
      <div class="reader-creator" id="readerCreator"></div>
    </div>
    <button class="icon-btn" id="favBtn" aria-label="Favorite">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
    </button>
    <a class="icon-btn" id="openExternal" href="#" target="_blank" rel="noopener" aria-label="Open in new tab">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
    </a>
  </div>

  <div class="page-viewport" id="pageViewport">
    <div class="page-stage" id="pageStage">

      <div>Loading…</div>

  <div class="reader-controls">
    <button class="nav-arrow" id="prevPage" aria-label="Previous page">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="page-indicator" id="pageIndicator">—</div>
    <button class="nav-arrow" id="nextPage" aria-label="Next page">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   PULP VAULT v5
   Sources:
     - Comics: archive.org "comics" collection (Golden/Silver Age)
     - Pulp Mags: archive.org "pulpmagazinearchive" (Weird Tales,
       Amazing Stories, Astounding, Black Mask, etc.)
   Reader: custom image-based with swipe / pinch / tap-zones / fullscreen
   Storage: localStorage for favorites + reading progress
   ============================================================ */

/* ---------- State ---------- */
const STATE = {
  source: 'comics',        // 'comics' | 'pulps' | 'fiction' | 'favorites'
  sort: 'popular',         // 'popular' | 'random' | 'new' | 'oldest'
  category: 'all',
  query: '',
  comics:  { items: [], loaded: false },
  pulps:   { items: [], loaded: false },
  fiction: { items: [], loaded: false }
};

/* ---------- Categories per source ----------
   Each category has a label and an extra query fragment to filter by subject/title.
   The keywords were chosen to match large numbers of items in each collection. */
const CATEGORIES = {
  comics: [
    { id: 'all',       label: 'All' },
    { id: 'superhero', label: 'Heroes',  q: 'subject:(superhero OR hero) OR title:(superman OR batman OR captain OR wonder OR torch OR flash OR atom OR daredevil)' },
    { id: 'horror',    label: 'Horror',  q: 'subject:(horror OR weird OR terror) OR title:(crypt OR vault OR weird OR horror OR shock OR terror OR creepy OR eerie)' },
    { id: 'scifi',     label: 'Sci-Fi',  q: 'subject:(science fiction OR space) OR title:(planet OR space OR atomic OR rocket OR futur OR mars OR strange adventures)' },
    { id: 'crime',     label: 'Crime',   q: 'subject:(crime OR detective OR noir) OR title:(crime OR detective OR justice OR mystery)' },
    { id: 'war',       label: 'War',     q: 'subject:(war OR combat) OR title:(war OR combat OR battle OR fightin OR g.i. OR commando)' },
    { id: 'romance',   label: 'Romance', q: 'subject:(romance OR love) OR title:(romance OR love OR heart OR sweetheart)' },
    { id: 'jungle',    label: 'Jungle',  q: 'subject:(jungle OR adventure) OR title:(jungle OR tarzan OR sheena OR ka-zar)' },
    { id: 'western',   label: 'Western', q: 'subject:western OR title:(western OR cowboy OR ranger OR frontier OR lash OR kid colt)' },
    { id: 'funny',     label: 'Funny',   q: 'subject:(humor OR funny) OR title:(funny OR comic OR animal)' }
  ],
  pulps: [
    { id: 'all',       label: 'All' },
    { id: 'horror',    label: 'Weird Tales',     q: 'title:(weird tales OR strange OR unknown)' },
    { id: 'scifi',     label: 'Sci-Fi',          q: 'title:(amazing OR astounding OR wonder OR planet OR thrilling wonder OR galaxy OR fantastic)' },
    { id: 'detective', label: 'Detective',       q: 'title:(black mask OR detective OR dime detective OR shadow OR spider)' },
    { id: 'adventure', label: 'Adventure',       q: 'title:(adventure OR argosy OR blue book OR doc savage)' },
    { id: 'western',   label: 'Western',         q: 'title:(western OR ranch OR cowboy OR frontier OR pete rice)' },
    { id: 'romance',   label: 'Love',            q: 'title:(love OR romance OR sweetheart)' },
    { id: 'war',       label: 'War & Air',       q: 'title:(war OR aces OR aviation OR flying OR battle OR combat)' }
  ],
  fiction: [
    { id: 'all',       label: 'All' },
    { id: 'tarzan',    label: 'Tarzan / Jungle',  q: 'tarzan jungle apes burroughs' },
    { id: 'mars',      label: 'Mars / Barsoom',   q: 'mars barsoom princess john carter warlord thuvia' },
    { id: 'conan',     label: 'Conan / Sword',    q: 'conan howard sword sorcery hyborian' },
    { id: 'lovecraft', label: 'Lovecraft',        q: 'lovecraft cthulhu arkham necronomicon dunwich' },
    { id: 'scifi',     label: 'Sci-Fi',           q: 'mars moon planet space rocket future scientist machine' },
    { id: 'horror',    label: 'Horror',           q: 'horror weird ghost haunted vampire occult terror' },
    { id: 'mystery',   label: 'Mystery',          q: 'detective mystery crime murder sherlock holmes' },
    { id: 'adventure', label: 'Adventure',        q: 'adventure lost world treasure pirate jungle expedition' }
  ],
  favorites: [{ id: 'all', label: 'All' }]
};

/* ---------- localStorage helpers ---------- */
const LS_FAVS = 'pv:favorites';
const LS_PROG = 'pv:progress';
function lsGet(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function getFavorites()   { return lsGet(LS_FAVS, {}); }
function saveFavorites(f) { lsSet(LS_FAVS, f); }
function isFavorite(id)   { return !!getFavorites()[id]; }
function toggleFavorite(comic) {
  const favs = getFavorites();
  if (favs[comic.archiveId]) {
    delete favs[comic.archiveId];
    showToast('Removed from favorites');
  } else {
    favs[comic.archiveId] = {
      archiveId: comic.archiveId,
      title: comic.title,
      year: comic.year,
      creator: comic.creator,
      source: comic.source || STATE.source,
      addedAt: Date.now()
    };
    showToast('★ Added to favorites');
  }
  saveFavorites(favs);
  return !!favs[comic.archiveId];
}
function getProgress()    { return lsGet(LS_PROG, {}); }
function saveProgress(p)  { lsSet(LS_PROG, p); }
function setProgress(comic, page, total) {
  const prog = getProgress();
  prog[comic.archiveId] = {
    archiveId: comic.archiveId,
    title: comic.title,
    year: comic.year,
    page,
    total,
    updatedAt: Date.now()
  };
  saveProgress(prog);
}
function getProgressFor(id) { return getProgress()[id]; }
function getMostRecentProgress() {
  const list = Object.values(getProgress()).sort((a, b) => b.updatedAt - a.updatedAt);
  // Filter to only "in-progress" (not finished, more than page 0)
  return list.find(p => p.page > 0 && (!p.total || p.page < p.total - 1));
}

/* ---------- DOM refs ---------- */
const grid          = document.getElementById('grid');
const searchInput   = document.getElementById('searchInput');
const sourceTabs    = document.querySelectorAll('.source-tab');
const chipsCategory = document.getElementById('chipsCategory');
const chipsSort     = document.querySelectorAll('#chipsSort .chip');
const continueStrip = document.getElementById('continueStrip');

/* ---------- Toast ---------- */
const toast = document.getElementById('toast');
let toastTimer = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

/* ---------- URL builders ---------- */
const coverUrl     = id => `https://archive.org/services/img/${id}`;
const externalUrl  = id => `https://archive.org/details/${id}`;
const pageImageUrl = (id, n, w = 1400) => `https://archive.org/download/${id}/page/n${n}_w${w}.jpg`;
const metadataUrl  = id => `https://archive.org/metadata/${id}`;

/* ---------- Fetch from Archive.org ---------- */
async function fetchSource(source) {
  let q;
  if (source === 'pulps') {
    q = 'collection:(pulpmagazinearchive) AND mediatype:texts';
  } else if (source === 'fiction') {
    // Pulp-era novels by famous public-domain authors (1900-1940 only — copyright-safe).
    // We restrict to scanned books (imagecount > 0) so the page-image reader works.
    // Also exclude items that are themselves comics or magazines, to avoid overlap.
    q = '(creator:("Edgar Rice Burroughs") OR creator:("H. P. Lovecraft") OR creator:("Howard, Robert E") ' +
        'OR creator:("Robert E. Howard") OR creator:("A. Merritt") OR creator:("Abraham Merritt") ' +
        'OR creator:("Sax Rohmer") OR creator:("Talbot Mundy") OR creator:("H. Rider Haggard") ' +
        'OR creator:("Arthur Conan Doyle") OR creator:("Jules Verne") OR creator:("H. G. Wells") ' +
        'OR creator:("Jack London") OR creator:("Rudyard Kipling") OR creator:("Algernon Blackwood") ' +
        'OR creator:("Lord Dunsany") OR creator:("Clark Ashton Smith") OR creator:("William Hope Hodgson") ' +
        'OR creator:("Edgar Allan Poe") OR creator:("Ambrose Bierce") OR creator:("M. R. James")) ' +
        'AND mediatype:texts AND imagecount:[1 TO 10000] ' +
        'AND -collection:comics AND -collection:pulpmagazinearchive';
  } else {
    q = 'collection:(comics) AND mediatype:texts';
  }

  const url = 'https://archive.org/advancedsearch.php?' +
    'q=' + encodeURIComponent(q) +
    '&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=year&fl[]=date&fl[]=downloads&fl[]=imagecount&fl[]=subject' +
    '&sort[]=downloads+desc' +
    '&rows=150&output=json';

  const res = await fetch(url);
  if (!res.ok) throw new Error('API fetch failed: ' + res.status);
  const data = await res.json();
  const docs = (data && data.response && data.response.docs) || [];
  return docs
    .filter(d => d.identifier && d.title)
    .map((d, i) => ({
      archiveId: d.identifier,
      title: d.title,
      creator: Array.isArray(d.creator) ? d.creator[0] : (d.creator || ''),
      year: d.year || (d.date ? new Date(d.date).getFullYear() : null),
      popularity: d.downloads || (10000 - i),
      added: d.date || '',
      pageCount: d.imagecount || null,
      subjects: Array.isArray(d.subject) ? d.subject.join(' ').toLowerCase() : (d.subject || '').toLowerCase(),
      source
    }));
}

async function ensureLoaded(source) {
  if (source === 'favorites') return;
  const slot = STATE[source];
  if (slot.loaded) return;
  try {
    grid.innerHTML = `<div class="empty"><div class="spinner" style="margin: 0 auto 14px;"></div><div>Loading the vault…</div></div>`;
    slot.items = await fetchSource(source);
    slot.loaded = true;
  } catch (err) {
    console.warn('Load failed:', err);
    slot.items = [];
    slot.loaded = true;
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><div>Could not reach Archive.org</div></div>`;
  }
}

/* ---------- Category matching ---------- */
function matchesCategory(item, catId) {
  if (catId === 'all') return true;
  const cat = (CATEGORIES[STATE.source] || []).find(c => c.id === catId);
  if (!cat || !cat.q) return true;
  // Pull out keywords from the q-string for client-side filtering
  const tokens = cat.q.toLowerCase().match(/[a-z0-9.\-]+/g) || [];
  const blob = `${item.title} ${item.subjects || ''} ${item.creator || ''}`.toLowerCase();
  return tokens.some(t => t.length > 2 && blob.includes(t) && !['title','subject','and','or'].includes(t));
}

/* ---------- Render ---------- */
function renderCategoryChips() {
  const cats = CATEGORIES[STATE.source] || [];
  chipsCategory.innerHTML = cats.map(c =>
    `<button class="chip ${c.id === STATE.category ? 'active gold' : ''}" data-cat="${c.id}">${c.label}</button>`
  ).join('');
  chipsCategory.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      STATE.category = chip.dataset.cat;
      renderCategoryChips();
      renderGallery();
    });
  });
}

function renderContinueStrip() {
  const recent = getMostRecentProgress();
  if (!recent) { continueStrip.innerHTML = ''; return; }
  const pct = recent.total ? Math.round((recent.page + 1) / recent.total * 100) : null;
  continueStrip.innerHTML = `
    <div class="continue-strip" id="continueBtn">
      <img class="continue-cover" src="${coverUrl(recent.archiveId)}" alt="">
      <div class="continue-info">
        <div class="continue-label">Continue Reading</div>
        <div class="continue-title">${escapeHtml(recent.title)}</div>
        <div class="continue-progress">Page ${recent.page + 1}${recent.total ? ' of ' + recent.total : ''}${pct ? ' · ' + pct + '%' : ''}</div>
      </div>
    </div>`;
  document.getElementById('continueBtn').addEventListener('click', () => {
    openReader({
      archiveId: recent.archiveId,
      title: recent.title,
      year: recent.year,
      creator: '',
      pageCount: recent.total
    }, recent.page);
  });
}

function getDisplayList() {
  let list;
  if (STATE.source === 'favorites') {
    list = Object.values(getFavorites()).map(f => ({
      ...f,
      popularity: 0,
      pageCount: null,
      added: new Date(f.addedAt).toISOString(),
      subjects: ''
    })).sort((a, b) => b.addedAt - a.addedAt);
  } else {
    list = STATE[STATE.source].items.slice();
  }

  // Filter: search
  const q = STATE.query.trim().toLowerCase();
  if (q) {
    list = list.filter(c =>
      c.title.toLowerCase().includes(q) ||
      String(c.year || '').includes(q) ||
      (c.creator || '').toLowerCase().includes(q)
    );
  }

  // Filter: category
  if (STATE.source !== 'favorites') {
    list = list.filter(item => matchesCategory(item, STATE.category));
  }

  // Sort
  if (STATE.sort === 'popular')      list.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
  else if (STATE.sort === 'new')     list.sort((a, b) => new Date(b.added || 0) - new Date(a.added || 0));
  else if (STATE.sort === 'oldest')  list.sort((a, b) => (a.year || 9999) - (b.year || 9999));
  else if (STATE.sort === 'random')  shuffleInPlace(list);

  return list;
}

function shuffleInPlace(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function renderGallery() {
  const list = getDisplayList();
  grid.innerHTML = '';
  if (!list.length) {
    const msg = STATE.source === 'favorites'
      ? 'No favorites yet. Tap the heart on any comic to save it.'
      : 'No issues found. Try a different category or search.';
    grid.innerHTML = `<div class="empty"><div class="empty-icon">${STATE.source === 'favorites' ? '♡' : '⚠'}</div><div>${msg}</div></div>`;
    return;
  }

  const progress = getProgress();
  list.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i, 12) * 30}ms`;
    const fav = isFavorite(c.archiveId);
    const prog = progress[c.archiveId];
    const progLabel = prog && prog.page > 0
      ? `<div class="card-progress">PG ${prog.page + 1}${prog.total ? '/' + prog.total : ''}</div>`
      : '';

    card.innerHTML = `
      <div class="cover">
        <div class="cover-fallback">${escapeHtml(shortTitle(c.title))}</div>
        <img loading="lazy" alt="${escapeHtml(c.title)} cover" src="${coverUrl(c.archiveId)}"
             onload="this.classList.add('loaded')"
             onerror="this.style.display='none'">
        <div class="cover-title">${escapeHtml(shortTitle(c.title))}</div>
        <button class="fav-badge ${fav ? 'active' : ''}" aria-label="Toggle favorite" data-fav-btn>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </button>
      </div>
      <div class="card-info">
        <div class="card-year">${c.year || ''}</div>
        ${progLabel}
      </div>`;

    // Favorite button (don't open reader when tapping it)
    card.querySelector('[data-fav-btn]').addEventListener('click', e => {
      e.stopPropagation();
      const nowFav = toggleFavorite(c);
      e.currentTarget.classList.toggle('active', nowFav);
      if (STATE.source === 'favorites') renderGallery();
    });

    card.addEventListener('click', () => {
      document.querySelectorAll('.card.selected').forEach(el => el.classList.remove('selected'));
      card.classList.add('selected');
      const startPage = (progress[c.archiveId] && progress[c.archiveId].page) || 0;
      setTimeout(() => openReader(c, startPage), 140);
    });
    grid.appendChild(card);
  });
}

function shortTitle(t) {
  // Trim long official titles like "Atomic War Issue #1 (Ace Comics)"
  return t.replace(/\s*\([^)]*\)\s*$/, '').slice(0, 60);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- Source / sort / search wiring ---------- */
sourceTabs.forEach(tab => {
  tab.addEventListener('click', async () => {
    sourceTabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    STATE.source = tab.dataset.source;
    STATE.category = 'all';
    renderCategoryChips();
    await ensureLoaded(STATE.source);
    renderContinueStrip();
    renderGallery();
  });
});

chipsSort.forEach(chip => {
  chip.addEventListener('click', () => {
    chipsSort.forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    STATE.sort = chip.dataset.sort;
    renderGallery();
  });
});

searchInput.addEventListener('input', e => {
  STATE.query = e.target.value;
  renderGallery();
});

document.getElementById('logo').addEventListener('click', () => {
  STATE.source = 'comics';
  STATE.category = 'all';
  STATE.sort = 'popular';
  STATE.query = '';
  searchInput.value = '';
  sourceTabs.forEach(t => t.classList.toggle('active', t.dataset.source === 'comics'));
  chipsSort.forEach(c => c.classList.toggle('active', c.dataset.sort === 'popular'));
  renderCategoryChips();
  renderGallery();
  renderContinueStrip();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

/* =============================================================
   READER
   ============================================================= */

const reader        = document.getElementById('reader');
const readerTitle   = document.getElementById('readerTitle');
const readerCreator = document.getElementById('readerCreator');
const readerLoading = document.getElementById('readerLoading');
const closeBtn      = document.getElementById('closeReader');
const openExt       = document.getElementById('openExternal');
const favBtn        = document.getElementById('favBtn');
const viewport      = document.getElementById('pageViewport');
const stage         = document.getElementById('pageStage');
const pageImg       = document.getElementById('pageImage');
const pageIndicator = document.getElementById('pageIndicator');
const progressFill  = document.getElementById('progressFill');
const prevBtn       = document.getElementById('prevPage');
const nextBtn       = document.getElementById('nextPage');
const tapLeft       = document.getElementById('tapLeft');
const tapRight      = document.getElementById('tapRight');
const tapHint       = document.getElementById('tapHint');

let currentComic = null;
let pageIndex = 0;
let totalPages = null;     // null = unknown
let knownMaxPage = 0;
let pageCache = new Map(); // n -> Image (preloaded)

let scale = 1, tx = 0, ty = 0;
const MIN_SCALE = 1, MAX_SCALE = 5;

function applyTransform(animate = false) {
  stage.style.transition = animate ? 'transform 0.2s ease' : 'none';
  stage.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}
function resetTransform() { scale = 1; tx = 0; ty = 0; applyTransform(); }

function updateIndicator() {
  if (totalPages) {
    pageIndicator.textContent = `${pageIndex + 1} / ${totalPages}`;
    progressFill.style.width = `${((pageIndex + 1) / totalPages) * 100}%`;
  } else {
    // Show only the page number when total is unknown - cleaner than "1+"
    pageIndicator.textContent = `Page ${pageIndex + 1}`;
    progressFill.style.width = `0%`;
  }
  prevBtn.disabled = pageIndex === 0;
  nextBtn.disabled = totalPages !== null && pageIndex >= totalPages - 1;
}

/* Preload a page in the background and cache it */
function preloadPage(n) {
  if (pageCache.has(n)) return;
  if (totalPages !== null && (n < 0 || n >= totalPages)) return;
  const img = new Image();
  img.src = pageImageUrl(currentComic.archiveId, n);
  pageCache.set(n, img);
}

function loadPage(n) {
  if (n < 0) return;
  if (totalPages !== null && n >= totalPages) return;
  pageIndex = n;
  resetTransform();

  const url = pageImageUrl(currentComic.archiveId, n);
  const cached = pageCache.get(n);

  // If preloaded and ready, swap instantly
  if (cached && cached.complete && cached.naturalWidth > 0) {
    pageImg.src = url;
    readerLoading.style.display = 'none';
    if (n > knownMaxPage) knownMaxPage = n;
  } else {
    readerLoading.style.display = 'flex';
    pageImg.style.opacity = '0';
    pageImg.onload = () => {
      readerLoading.style.display = 'none';
      pageImg.style.opacity = '1';
      if (n > knownMaxPage) knownMaxPage = n;
      updateIndicator();
    };
    pageImg.onerror = () => {
      // Hit the end - lock totalPages
      if (n > 0 && totalPages === null) {
        totalPages = n;
        loadPage(n - 1);
      } else if (n === 0) {
        readerLoading.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:0 20px;line-height:1.5;">Could not load this comic.<br>Try opening it on Archive.org.</div>';
      }
    };
    pageImg.src = url;
  }

  // Save progress
  if (currentComic) setProgress(currentComic, n, totalPages);

  // Preload neighbors
  preloadPage(n + 1);
  preloadPage(n + 2);
  if (n > 0) preloadPage(n - 1);

  updateIndicator();
}

function nextPage() {
  if (totalPages !== null && pageIndex >= totalPages - 1) return;
  loadPage(pageIndex + 1);
}
function prevPage() {
  if (pageIndex > 0) loadPage(pageIndex - 1);
}

prevBtn.addEventListener('click', prevPage);
nextBtn.addEventListener('click', nextPage);

/* Tap zones - explicit prev/next */
tapLeft.addEventListener('click', e => { e.stopPropagation(); prevPage(); });
tapRight.addEventListener('click', e => { e.stopPropagation(); nextPage(); });

/* ---------- Fetch exact metadata when reader opens ---------- */
async function fetchPageCount(archiveId) {
  try {
    const res = await fetch(metadataUrl(archiveId));
    if (!res.ok) return null;
    const data = await res.json();
    // Strategy 1: explicit imagecount in metadata
    const imageCount = data?.metadata?.imagecount;
    if (imageCount) return parseInt(imageCount, 10);
    // Strategy 2: count single-page JP2s in the files list
    const files = data?.files || [];
    const jp2 = files.filter(f => /_jp2\.zip$/i.test(f.name));
    // Strategy 3: count individual page images
    const pageFiles = files.filter(f => /n\d+\.jp2$|n\d+_w\d+\.jpg$/i.test(f.name));
    if (pageFiles.length) return pageFiles.length;
    // Strategy 4: PDF page count from format-specific field
    const pdf = files.find(f => /\.pdf$/i.test(f.name));
    if (pdf && pdf.pdfpages) return parseInt(pdf.pdfpages, 10);
    return null;
  } catch (err) {
    console.warn('Metadata fetch failed:', err);
    return null;
  }
}

/* ---------- Reader open/close ---------- */
async function openReader(comic, startPage = 0) {
  currentComic = comic;
  pageCache = new Map();
  knownMaxPage = 0;
  pageIndex = startPage;
  totalPages = comic.pageCount || null;

  readerTitle.textContent = comic.title;
  const creator = (comic.creator || '').toString().slice(0, 40);
  readerCreator.textContent = creator
    ? `${creator}${comic.year ? ' · ' + comic.year : ''}`
    : (comic.year ? String(comic.year) : '');
  openExt.href = externalUrl(comic.archiveId);
  favBtn.classList.toggle('fav-active', isFavorite(comic.archiveId));

  reader.classList.add('open');
  reader.classList.remove('immersive');
  document.body.style.overflow = 'hidden';
  readerLoading.innerHTML = '<div class="spinner"></div><div>Loading…</div>';

  loadPage(startPage);

  // Show tap-zone hint briefly on first open
  tapHint.classList.add('show');
  setTimeout(() => tapHint.classList.remove('show'), 1700);

  // Fetch exact total page count in the background
  if (!totalPages) {
    const count = await fetchPageCount(comic.archiveId);
    if (count && (!totalPages || count !== totalPages)) {
      totalPages = count;
      updateIndicator();
    }
  }
}

function closeReader() {
  if (currentComic) setProgress(currentComic, pageIndex, totalPages);
  reader.classList.remove('open', 'immersive');
  document.body.style.overflow = '';
  pageImg.src = '';
  currentComic = null;
  pageCache = new Map();
  renderGallery();          // refresh progress badges
  renderContinueStrip();
}

closeBtn.addEventListener('click', closeReader);

favBtn.addEventListener('click', () => {
  if (!currentComic) return;
  const nowFav = toggleFavorite(currentComic);
  favBtn.classList.toggle('fav-active', nowFav);
});

document.addEventListener('keydown', e => {
  if (!reader.classList.contains('open')) return;
  if (e.key === 'Escape')      closeReader();
  if (e.key === 'ArrowRight')  nextPage();
  if (e.key === 'ArrowLeft')   prevPage();
  if (e.key === 'f' || e.key === 'F') toggleImmersive();
});

function toggleImmersive() {
  reader.classList.toggle('immersive');
}

/* ---------- Touch gestures ---------- */
let gesture = null;
let startX = 0, startY = 0, startTime = 0;
let startScale = 1, startTx = 0, startTy = 0;
let startDist = 0, startMidX = 0, startMidY = 0;
let lastTapTime = 0, lastTapX = 0, lastTapY = 0;
let dragX = 0;

function dist(a, b) {
  const dx = a.clientX - b.clientX, dy = a.clientY - b.clientY;
  return Math.hypot(dx, dy);
}

viewport.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startTime = Date.now();
    startTx = tx; startTy = ty;
    dragX = 0;
    gesture = scale > 1 ? 'pan' : 'swipe';
  } else if (e.touches.length === 2) {
    gesture = 'pinch';
    startDist = dist(e.touches[0], e.touches[1]);
    startScale = scale;
    startMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    startMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    startTx = tx; startTy = ty;
  }
}, { passive: true });

viewport.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && gesture === 'pan') {
    const t = e.touches[0];
    tx = startTx + (t.clientX - startX);
    ty = startTy + (t.clientY - startY);
    applyTransform();
  } else if (e.touches.length === 1 && gesture === 'swipe') {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    // Only treat as horizontal swipe if it's clearly horizontal
    if (Math.abs(dx) > Math.abs(dy)) {
      dragX = dx;
      stage.style.transition = 'none';
      stage.style.transform = `translate(${dx}px, 0)`;
    }
  } else if (e.touches.length === 2 && gesture === 'pinch') {
    const d = dist(e.touches[0], e.touches[1]);
    const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, startScale * (d / startDist)));
    const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const ratio = newScale / startScale;
    tx = startTx + (midX - startMidX) - (startMidX - startTx) * (ratio - 1);
    ty = startTy + (midY - startMidY) - (startMidY - startTy) * (ratio - 1);
    scale = newScale;
    applyTransform();
  }
}, { passive: true });

viewport.addEventListener('touchend', e => {
  const elapsed = Date.now() - startTime;

  if (gesture === 'swipe' && e.changedTouches.length) {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const horiz = Math.abs(dx) > Math.abs(dy);
    const fast = elapsed < 300;
    // Swipe threshold: 60px normal, 30px if quick flick
    const threshold = fast ? 30 : 60;

    if (horiz && Math.abs(dx) > threshold) {
      if (dx < 0) nextPage(); else prevPage();
    } else if (Math.abs(dx) < 8 && Math.abs(dy) < 8 && elapsed < 250) {
      // Pure tap (not drag) in the middle - toggle immersive
      // BUT only if it wasn't on a tap-zone (those handle their own clicks)
      const t = e.changedTouches[0];
      const inLeftZone  = t.clientX < window.innerWidth * 0.22;
      const inRightZone = t.clientX > window.innerWidth * 0.78;
      if (!inLeftZone && !inRightZone) {
        // Check for double-tap first
        const now = Date.now();
        if (now - lastTapTime < 300 && Math.hypot(t.clientX - lastTapX, t.clientY - lastTapY) < 30) {
          // Double tap: toggle zoom
          if (scale > 1) {
            resetTransform();
            applyTransform(true);
          } else {
            scale = 2.5;
            const rect = viewport.getBoundingClientRect();
            tx = (rect.width / 2 - (t.clientX - rect.left)) * 1.5;
            ty = (rect.height / 2 - (t.clientY - rect.top)) * 1.5;
            applyTransform(true);
          }
          lastTapTime = 0;
        } else {
          lastTapTime = now;
          lastTapX = t.clientX;
          lastTapY = t.clientY;
          // Single-tap action delayed, in case a second tap follows
          setTimeout(() => {
            if (lastTapTime === now) toggleImmersive();
          }, 280);
        }
      }
      // Snap stage back
      stage.style.transition = 'transform 0.2s ease';
      stage.style.transform = `translate(0, 0)`;
    } else {
      // Snap back if swipe didn't trigger
      stage.style.transition = 'transform 0.2s ease';
      stage.style.transform = `translate(0, 0)`;
    }
  }
  if (scale < MIN_SCALE) { scale = MIN_SCALE; tx = 0; ty = 0; applyTransform(true); }
  gesture = null;
}, { passive: true });

/* ---------- Init ---------- */
async function init() {
  renderCategoryChips();
  await ensureLoaded('comics');
  renderContinueStrip();
  renderGallery();
}
init();
</script>
